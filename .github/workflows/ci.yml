name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install server dependencies
        run: npm install
        working-directory: server
      - name: Run server tests
        run: npm test
        working-directory: server
      - name: Build client
        run: |
          npm install
          npm run build
        working-directory: client
